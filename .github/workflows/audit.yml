# AI Trust Engine — PR 审查
#
# 当 PR 创建或更新时，自动审查 AI 生成的代码。
# 审查结果会评论到 PR 上。
#
# 需要在仓库 Settings → Secrets 中配置：
#   OPENAI_API_KEY 或 ANTHROPIC_API_KEY（至少一个）

name: AI Trust Audit

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Get PR diff
        id: diff
        run: |
          # 获取 PR 修改的文件内容
          DIFF=$(git diff origin/main...HEAD -- '*.py' '*.js' '*.ts' '*.java' '*.go')
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run audit
        if: steps.diff.outputs.diff != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          import asyncio
          import json
          import os
          from audison.engine import TrustEngine

          async def main():
              engine = TrustEngine()
              report = await engine.audit(
                  requirement='审查 PR #${{ github.event.pull_request.number }} 的代码变更',
                  ai_output='''${{ steps.diff.outputs.diff }}''',
              )
              
              # 输出报告
              print(report.to_markdown())
              
              # 保存 JSON 报告
              with open('trust-report.json', 'w') as f:
                  f.write(report.to_json())
              # 保存 Markdown 报告（供 JS 端读取）
              with open('trust-report.md', 'w') as f:
                  f.write(report.to_markdown())
              
              # 如果有高风险问题，退出码非零
              high_risks = [r for r in report.risks if r.level in ('high', 'critical')]
              if high_risks:
                  print(f'发现 {len(high_risks)} 个高风险问题')
                  exit(1)

          asyncio.run(main())
          "

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // 读取 JSON 报告（用于结构化数据）
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('trust-report.json', 'utf8'));
            } catch (e) {
              console.log('No report found');
              return;
            }
            
            // 读取 Markdown 报告（完整格式）
            let reportMarkdown = '';
            try {
              reportMarkdown = fs.readFileSync('trust-report.md', 'utf8');
            } catch (e) {
              reportMarkdown = '详细报告见 trust-report.json';
            }
            
            const verdict = report.verdict === 'pass' ? '✅ 通过' : 
                           report.verdict === 'review' ? '⚠️ 需要审查' : '❌ 拒绝';
            
            const body = `## AI Trust Audit 报告
            
            **结论**: ${verdict}
            **置信度**: ${report.confidence}/100
            **发现问题**: ${report.findings ? report.findings.length : 0} 个
            **风险点**: ${report.risks ? report.risks.length : 0} 个
            **不确定性**: ${report.uncertainty ? report.uncertainty.length : 0} 项
            
            ---
            
            ${reportMarkdown}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
