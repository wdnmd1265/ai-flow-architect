name: AI Code Audit on Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      path:
        description: 'Path to audit (relative to repo root)'
        required: false
        default: '.'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for diff analysis

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install audison
        run: |
          pip install audison

      - name: Run audit on changed files
        id: audit
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Get list of changed files in the PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(py|js|ts|jsx|tsx|go|rs|java)$' | tr '\n' ' ')
          if [ -z "$CHANGED" ]; then
            echo "No code files changed. Skipping audit."
            echo "summary=No code files changed in this PR." >> $GITHUB_OUTPUT
            exit 0
          fi
          # Run audit and capture output
          audison audit $CHANGED --html --output audit-report.html 2>&1 | tee audit.log
          # Extract summary
          SUMMARY=$(grep -E "Found|Critical|High" audit.log | head -n 3 | tr '\n' ' ')
          echo "summary=${SUMMARY:-Audit completed. See report for details.}" >> $GITHUB_OUTPUT

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.html
          retention-days: 14

      - name: Comment PR with audit summary
        if: steps.audit.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ai-code-audit
          message: |
            ## AI Code Audit Results

            ${{ steps.audit.outputs.summary }}

            Full HTML report available in the [workflow artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

            > This audit was automatically generated by [Audison](https://github.com/${{ github.repository }}). The pipeline runs two independent AI arbiters to cross-verify each finding before reporting.