# 模型选择策略
selection_strategy:
  # 任务类型映射
  task_mapping:
    "需求分析": ["gpt-4", "claude-3-opus"]
    "创意设计": ["gpt-4", "claude-3-opus"]
    "代码实现": ["gpt-4", "gpt-4-turbo"]
    "代码审查": ["gpt-4", "claude-3-opus"]
    "简单任务": ["gpt-3.5-turbo", "claude-3-haiku"]
  
  # 成本优化策略
  cost_optimization:
    enabled: true
    max_cost_per_task: 1.0  # 美元
    prefer_cheaper_models: true
    fallback_to_cheaper: true
  
  # 性能优化策略
  performance_optimization:
    enabled: true
    prefer_faster_models: true
    max_latency: 30  # 秒
    concurrent_requests: 5

# 模型切换规则
switching_rules:
  # 自动切换条件
  auto_switch:
    enabled: true
    conditions:
      - type: "cost_threshold"
        threshold: 0.5  # 美元
        action: "switch_to_cheaper"
      
      - type: "latency_threshold"
        threshold: 20  # 秒
        action: "switch_to_faster"
      
      - type: "error_rate"
        threshold: 0.1  # 10%
        action: "switch_to_alternative"
  
  # 手动切换
  manual_switch:
    enabled: true
    allow_user_override: true
    require_confirmation: true

# 模型监控
monitoring:
  enabled: true
  track_usage: true
  track_costs: true
  track_latency: true
  track_errors: true
  
  # 告警规则
  alerts:
    cost_threshold: 10.0  # 美元
    error_rate_threshold: 0.05  # 5%
    latency_threshold: 30  # 秒
    
    notification_channels:
      - "log"
      - "email"
      - "webhook"

# brain2 自动降级路径
# 当用户只配置 brain1 时，框架自动选择同提供商的更便宜模型作为 brain2。
# 添加新提供商只需在此处添加对应映射，无需修改 Python 代码。
fallbacks:
  # OpenAI 模型降级路径
  openai:
    gpt-4o: "gpt-4o-mini"
    gpt-4o-mini: "gpt-3.5-turbo"
    gpt-4-turbo: "gpt-4o-mini"
    gpt-4: "gpt-3.5-turbo"
    gpt-3.5-turbo: "gpt-4o-mini"

  # Anthropic 模型降级路径
  anthropic:
    # Claude 3.5 系列（最新）
    claude-3-5-sonnet-20241022: "claude-3-5-haiku-20240620"
    claude-3-5-sonnet: "claude-3-5-haiku"
    claude-3-5-haiku-20240620: "claude-3-5-sonnet-20241022"
    claude-3-5-haiku: "claude-3-5-sonnet"
    # Claude 3 系列（旧版，降级到 3.5 系列）
    claude-3-opus: "claude-3-5-haiku-20240620"
    claude-3-sonnet: "claude-3-5-haiku"
    claude-3-haiku: "claude-3-5-haiku"

  # 通义千问（DashScope）降级路径
  dashscope:
    qwen-max: "qwen-plus"
    qwen-plus: "qwen-turbo"
    qwen-turbo: "qwen-turbo"

  # 智谱 GLM 降级路径
  zhipu:
    glm-4: "glm-4-flash"
    glm-4-flash: "glm-3-turbo"
    glm-3-turbo: "glm-4-flash"

  # 月之暗面 Kimi 降级路径
  moonshot:
    moonshot-v1-8k: "moonshot-v1-32k"
    moonshot-v1-32k: "moonshot-v1-128k"
    moonshot-v1-128k: "moonshot-v1-32k"

  # DeepSeek 降级路径
  deepseek:
    deepseek-chat: "deepseek-coder"
    deepseek-coder: "deepseek-chat"

  # Ollama 本地模型降级路径
  local:
    llama3: "qwen2.5-coder"
    qwen2.5-coder: "llama3"

  # 自定义 OpenAI 兼容接口降级路径
  # 当用户只配置 custom-model 作为 brain1 时，brain2 也使用 custom-model
  # 用户可以自己配置多个自定义模型
  custom:
    custom-model: "custom-model"

  # 默认兜底（当模型不在上述任何映射中时使用）
  default_fallback: "gpt-4o-mini"