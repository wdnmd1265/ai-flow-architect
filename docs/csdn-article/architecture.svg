<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
    .title { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
    .sub { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    .label { font-size: 11px; font-weight: 400; fill: #888780; }
    .badge { font-size: 10px; font-weight: 500; fill: white; }
  </style>

  <!-- User Input -->
  <rect x="195" y="20" width="290" height="40" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="title" x="340" y="44" text-anchor="middle" dominant-baseline="central">"设计一套用户管理系统"</text>

  <!-- Arrow down -->
  <line x1="340" y1="60" x2="340" y2="80" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Brain #1 -->
  <rect x="170" y="80" width="340" height="56" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text class="title" x="340" y="100" text-anchor="middle" dominant-baseline="central">Brain #1 规划脑 (GPT-4o)</text>
  <text class="sub" x="340" y="120" text-anchor="middle" dominant-baseline="central">分析需求，生成执行蓝图，标注风险点</text>

  <!-- Arrow down -->
  <line x1="340" y1="136" x2="340" y2="156" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Opponent Brain -->
  <rect x="140" y="156" width="400" height="56" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text class="title" x="340" y="176" text-anchor="middle" dominant-baseline="central">对手脑 Opponent Brain</text>
  <text class="sub" x="340" y="196" text-anchor="middle" dominant-baseline="central">安全审计 / 成本分析 / 用户体验 / 数据严谨 / 极简主义</text>

  <!-- Opponent warning bubble -->
  <rect x="500" y="162" width="160" height="44" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text class="sub" x="580" y="178" text-anchor="middle" dominant-baseline="central" fill="#993C1D">WARNING:</text>
  <text class="sub" x="580" y="196" text-anchor="middle" dominant-baseline="central" fill="#993C1D">密码哈希未指定!</text>

  <!-- Approval gate -->
  <rect x="270" y="228" width="140" height="32" rx="16" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text class="title" x="340" y="244" text-anchor="middle" dominant-baseline="central" fill="#444441">你审批蓝图</text>

  <!-- Arrow down -->
  <line x1="340" y1="212" x2="340" y2="228" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="260" x2="340" y2="276" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Expert Team -->
  <rect x="60" y="276" width="560" height="56" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text class="title" x="340" y="296" text-anchor="middle" dominant-baseline="central">专家团队 (会话隔离)</text>

  <!-- Expert boxes inside -->
  <rect x="80" y="308" width="110" height="20" rx="4" fill="#5DCAA5" stroke="none"/>
  <text class="badge" x="135" y="320" text-anchor="middle" dominant-baseline="central">Creative</text>

  <rect x="210" y="308" width="110" height="20" rx="4" fill="#378ADD" stroke="none"/>
  <text class="badge" x="265" y="320" text-anchor="middle" dominant-baseline="central">Evaluator</text>

  <rect x="340" y="308" width="110" height="20" rx="4" fill="#7F77DD" stroke="none"/>
  <text class="badge" x="395" y="320" text-anchor="middle" dominant-baseline="central">Programmer</text>

  <rect x="470" y="308" width="110" height="20" rx="4" fill="#D85A30" stroke="none"/>
  <text class="badge" x="525" y="320" text-anchor="middle" dominant-baseline="central">Reviewer</text>

  <!-- Arrows between experts -->
  <line x1="190" y1="318" x2="210" y2="318" stroke="white" stroke-width="1"/>
  <line x1="320" y1="318" x2="340" y2="318" stroke="white" stroke-width="1"/>
  <line x1="450" y1="318" x2="470" y2="318" stroke="white" stroke-width="1"/>

  <!-- Arrow down -->
  <line x1="340" y1="332" x2="340" y2="352" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Brain #2 -->
  <rect x="170" y="352" width="340" height="56" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text class="title" x="340" y="372" text-anchor="middle" dominant-baseline="central">Brain #2 仲裁脑 (Claude)</text>
  <text class="sub" x="340" y="392" text-anchor="middle" dominant-baseline="central">逐项比对蓝图 vs 交付物，跨模型审查</text>

  <!-- Arrow down split -->
  <line x1="340" y1="408" x2="340" y2="424" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="424" x2="220" y2="424" stroke="#888780" stroke-width="1"/>
  <line x1="340" y1="424" x2="460" y2="424" stroke="#888780" stroke-width="1"/>
  <line x1="220" y1="424" x2="220" y2="440" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="460" y1="424" x2="460" y2="440" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Pass -->
  <rect x="140" y="440" width="160" height="40" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text class="title" x="220" y="460" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Pass → 交付</text>

  <!-- Fail -->
  <rect x="380" y="440" width="160" height="40" rx="8" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text class="title" x="460" y="460" text-anchor="middle" dominant-baseline="central" fill="#A32D2D">Fail → 修改</text>

  <!-- Return arrow from Fail to Expert Team -->
  <path d="M540 460 L570 460 L570 304 L620 304" fill="none" stroke="#E24B4A" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text class="label" x="575" y="380" fill="#A32D2D" transform="rotate(90, 575, 380)">返回修改</text>

  <!-- YOU sidebar -->
  <rect x="20" y="80" width="100" height="400" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="title" x="70" y="110" text-anchor="middle" dominant-baseline="central" fill="#3C3489">YOU</text>
  <line x1="30" y1="125" x2="110" y2="125" stroke="#B4B2A9" stroke-width="0.5"/>

  <text class="sub" x="70" y="150" text-anchor="middle" dominant-baseline="central">审批</text>
  <text class="sub" x="70" y="165" text-anchor="middle" dominant-baseline="central">蓝图</text>

  <text class="sub" x="70" y="245" text-anchor="middle" dominant-baseline="central">批准/</text>
  <text class="sub" x="70" y="260" text-anchor="middle" dominant-baseline="central">驳回</text>

  <text class="sub" x="70" y="380" text-anchor="middle" dominant-baseline="central">审核</text>
  <text class="sub" x="70" y="395" text-anchor="middle" dominant-baseline="central">质量</text>

  <!-- Dotted lines from YOU to zones -->
  <line x1="120" y1="108" x2="170" y2="108" stroke="#534AB7" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="120" y1="244" x2="270" y2="244" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="120" y1="380" x2="170" y2="380" stroke="#639922" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <text class="label" x="340" y="500" text-anchor="middle" dominant-baseline="central">AI generates. AI challenges. You decide.</text>
</svg>